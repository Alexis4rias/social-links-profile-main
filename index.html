<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Social links profile</title>


</head>
<body>

  <section class="card">
    <div class="card-container">
      <div class="img-container">
        <img src="/assets/images/avatar-jessica.jpeg" alt="" class="img-profile">
      </div>

      <div class="data-user">
        <h1 class="name">Jessica Randall</h1>
        <p class="city">London, United Kingdom</p>
      </div>

      <div class="description">
        <p>"Front-end developer and avid reader."</p>
      </div>

      <div class="plataforms">
        <button class="btn">
          GitHub
        </button>

        <button class="btn">
          Frontend Mentor
        </button>

        <button class="btn">
          Linkedin
        </button>

        <button class="btn">
          Twitter
        </button>

        <button class="btn">
          Instragram
        </button>
      </div>

      <div class="attribution">
        <p>
          Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" class="text">Frontend Mentor</a>. 
          Coded by <a href="https://www.instagram.com/_simply.alexis_arias/" class="text">Alexis Arias</a>.
        </p> 
      </div>
    </section>
</body>
</html>
